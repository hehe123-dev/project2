<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="format-detection" content="telephone=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>白石桥七号 - 北理工校友商务平台</title>
<style>
/* ================================================================
   CSS VARIABLES & RESET
   ================================================================ */
:root {
  --primary: #6fa4cf;
  --primary-light: #9bc1de;
  --accent: #dabb6e;
  --bg: #fafbfc;
  --white: #ffffff;
  --text: #333333;
  --text-light: #666666;
  --text-lighter: #999999;
  --border: #ebedf0;
  --danger: #ee0a24;
  --success: #07c160;
  --warning: #ff976a;
  --nav-h: 46px;
  --tab-h: 50px;
  --safe-b: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 14px; -webkit-font-smoothing: antialiased; }
body {
  font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
  background: var(--bg); color: var(--text); max-width: 100vw; overflow-x: hidden;
}
svg, svg * { pointer-events: none !important; }
a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }
input, textarea, button { font: inherit; outline: none; border: none; background: none; }
ul, ol { list-style: none; }

/* ================================================================
   LAYOUT HELPERS
   ================================================================ */
.page-container { min-height: 100vh; background: var(--bg); padding-bottom: calc(100px + var(--safe-b)); }
.page-container.no-tab { padding-bottom: calc(100px + var(--safe-b)); }
.page-header {
  position: sticky; top: 0; z-index: 99;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex; align-items: center; padding: 0 12px; height: var(--nav-h);
}
.page-header .back-btn { color: #fff; font-size: 18px; padding: 4px 8px; cursor: pointer; }
.page-header .title { flex: 1; text-align: center; color: #fff; font-size: 16px; font-weight: 600; }
.page-header .right-slot { min-width: 44px; text-align: right; }
.section-title { display: flex; align-items: center; justify-content: space-between; padding: 16px 16px 8px; font-size: 16px; font-weight: 700; }
.section-title .more { font-size: 12px; color: var(--text-lighter); cursor: pointer; }
.card-list { padding: 0 12px; }
.content-detail { background: #fff; padding: 16px; margin: 0 12px 12px; border-radius: 8px; }
.content-detail h3 { font-size: 18px; margin-bottom: 8px; }
.content-detail .meta { font-size: 12px; color: var(--text-lighter); margin-bottom: 12px; }
.content-detail .body { font-size: 15px; line-height: 1.8; }
.content-detail .body p { margin-bottom: 10px; }
.content-detail .body img { margin: 8px 0; border-radius: 4px; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 0; color: var(--text-lighter); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }

/* ================================================================
   COMPONENT: NAVBAR
   ================================================================ */
.comp-navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--nav-h); display: flex; align-items: center;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  padding: 0 12px;
}
.comp-navbar-placeholder { height: var(--nav-h); }
.comp-navbar .nav-back { color: #fff; font-size: 18px; padding: 4px 8px; cursor: pointer; min-width: 44px; }
.comp-navbar .nav-title { flex: 1; text-align: center; color: #fff; font-size: 16px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.comp-navbar .nav-right { min-width: 44px; text-align: right; color: #fff; font-size: 14px; cursor: pointer; }

/* ================================================================
   COMPONENT: TABBAR
   ================================================================ */
.comp-tabbar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  height: calc(var(--tab-h) + var(--safe-b)); padding-bottom: var(--safe-b);
  display: flex; align-items: center; background: #fff; box-shadow: 0 -1px 6px rgba(0,0,0,.06);
}
.comp-tabbar .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: var(--text-lighter); font-size: 10px; gap: 2px; }
.comp-tabbar .tab-item.active { color: var(--primary); }
.comp-tabbar .tab-item svg { width: 22px; height: 22px; }
.comp-tabbar .tab-publish { flex: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
.comp-tabbar .tab-publish .publish-btn {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 24px; margin-top: -18px;
  box-shadow: 0 2px 8px rgba(111,164,207,.4);
}
.comp-tabbar .tab-publish.disabled .publish-btn { background: #e5e5e5; color: #bbb; box-shadow: none; }

/* ================================================================
   COMPONENT: CELL
   ================================================================ */
.comp-cell {
  display: flex; align-items: center; padding: 12px 16px; background: #fff;
  cursor: pointer; transition: background .2s; position: relative;
}
.comp-cell:active { background: #f5f5f5; }
.comp-cell + .comp-cell { border-top: 1px solid var(--border); }
.comp-cell .cell-icon { margin-right: 10px; }
.comp-cell .cell-body { flex: 1; min-width: 0; }
.comp-cell .cell-title { font-size: 14px; color: var(--text); }
.comp-cell .cell-label { font-size: 12px; color: var(--text-lighter); margin-top: 2px; }
.comp-cell .cell-value { font-size: 13px; color: var(--text-light); text-align: right; margin-left: 8px; }
.comp-cell .cell-arrow { margin-left: 6px; color: #c8c9cc; font-size: 14px; }
.comp-cell-group { margin: 12px; background: #fff; border-radius: 8px; overflow: hidden; }
.comp-cell-group.inset { margin: 12px 16px; }

/* ================================================================
   COMPONENT: CARD
   ================================================================ */
.comp-card { display: flex; padding: 12px 0; cursor: pointer; }
.comp-card + .comp-card { border-top: 1px solid var(--border); }
.comp-card .card-thumb { width: 100px; height: 70px; border-radius: 6px; object-fit: cover; flex-shrink: 0; margin-right: 10px; background: #f0f0f0; }
.comp-card .card-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: space-between; }
.comp-card .card-title { font-size: 14px; font-weight: 600; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
.comp-card .card-desc { font-size: 12px; color: var(--text-light); display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
.comp-card .card-meta { font-size: 11px; color: var(--text-lighter); }

/* ================================================================
   COMPONENT: TAG
   ================================================================ */
.comp-tag { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; line-height: 1.4; }
.comp-tag.primary { background: #e8f4fd; color: var(--primary); }
.comp-tag.danger { background: #fff0f0; color: var(--danger); }
.comp-tag.success { background: #e8f8ee; color: var(--success); }
.comp-tag.warning { background: #fff7ed; color: var(--warning); }
.comp-tag.plain { background: #f5f5f5; color: var(--text-light); }

/* ================================================================
   COMPONENT: BADGE
   ================================================================ */
.comp-badge { position: relative; display: inline-block; }
.comp-badge .badge-dot { position: absolute; top: -2px; right: -4px; min-width: 16px; height: 16px; padding: 0 4px; border-radius: 8px; background: var(--danger); color: #fff; font-size: 10px; line-height: 16px; text-align: center; }

/* ================================================================
   COMPONENT: BUTTON
   ================================================================ */
.comp-btn {
  display: inline-block; padding: 8px 20px; border-radius: 4px; font-size: 14px;
  cursor: pointer; text-align: center; transition: opacity .2s; border: 1px solid transparent;
}
.comp-btn:active { opacity: .8; }
.comp-btn.primary { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: #fff; }
.comp-btn.danger { background: var(--danger); color: #fff; }
.comp-btn.success { background: var(--success); color: #fff; }
.comp-btn.round { border-radius: 99px; }
.comp-btn.block { display: block; width: 100%; }
.comp-btn.small { padding: 6px 14px; font-size: 12px; }
.comp-btn.outline { background: #fff; border-color: var(--primary); color: var(--primary); }

/* ================================================================
   COMPONENT: SEARCH
   ================================================================ */
.comp-search { padding: 8px 12px; background: #fff; }
.comp-search .search-wrap { display: flex; align-items: center; background: #f5f6f8; border-radius: 8px; padding: 8px 12px; }
.comp-search .search-wrap svg { width: 16px; height: 16px; color: var(--text-lighter); margin-right: 6px; flex-shrink: 0; }
.comp-search .search-wrap input { flex: 1; font-size: 14px; background: transparent; border: none; outline: none; }
.comp-search .search-wrap .search-clear { font-size: 16px; color: #c8c9cc; cursor: pointer; margin-left: 6px; }

/* ================================================================
   COMPONENT: SWIPE
   ================================================================ */
.comp-swipe { position: relative; overflow: hidden; margin: 10px 12px; border-radius: 10px; }
.comp-swipe .swipe-track { display: flex; transition: transform .3s; }
.comp-swipe .swipe-item { min-width: 100%; height: 150px; }
.comp-swipe .swipe-item img { width: 100%; height: 100%; object-fit: cover; }
.comp-swipe .swipe-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
.comp-swipe .swipe-dots span { width: 6px; height: 6px; border-radius: 3px; background: rgba(255,255,255,.5); transition: all .2s; }
.comp-swipe .swipe-dots span.active { width: 16px; background: #fff; }

/* ================================================================
   COMPONENT: TABS
   ================================================================ */
.comp-tabs { position: sticky; top: var(--nav-h); z-index: 10; background: #fff; }
.comp-tabs .tabs-nav { display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; }
.comp-tabs .tabs-nav::-webkit-scrollbar { display: none; }
.comp-tabs .tab-nav-item { padding: 10px 16px; font-size: 14px; color: var(--text-light); white-space: nowrap; cursor: pointer; position: relative; transition: color .2s; }
.comp-tabs .tab-nav-item.active { color: var(--primary); font-weight: 600; }
.comp-tabs .tab-nav-item.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 20px; height: 2px; background: var(--primary); border-radius: 1px; }

/* ================================================================
   COMPONENT: POPUP
   ================================================================ */
.comp-popup-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
.comp-popup-overlay.center { align-items: center; }
.comp-popup { background: #fff; width: 100%; border-radius: 16px 16px 0 0; max-height: 70vh; overflow-y: auto; animation: slideUp .25s ease; }
.comp-popup.center { border-radius: 12px; width: 85%; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.comp-popup .popup-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 16px; font-weight: 600; }
.comp-popup .popup-header .popup-close { font-size: 20px; color: var(--text-lighter); cursor: pointer; }

/* ================================================================
   COMPONENT: ACTIONSHEET
   ================================================================ */
.comp-actionsheet { background: #fff; border-radius: 16px 16px 0 0; animation: slideUp .25s ease; }
.comp-actionsheet .as-action { padding: 14px; text-align: center; font-size: 15px; cursor: pointer; }
.comp-actionsheet .as-action:active { background: #f5f5f5; }
.comp-actionsheet .as-action + .as-action { border-top: 1px solid var(--border); }
.comp-actionsheet .as-cancel {
  padding: 14px; text-align: center; font-size: 15px; cursor: pointer;
  border-top: 6px solid #f5f6f8; color: var(--text-light);
}
.comp-actionsheet .as-cancel:active { background: #f5f5f5; }

/* ================================================================
   COMPONENT: PROGRESS
   ================================================================ */
.comp-progress { height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; }
.comp-progress .bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 3px; transition: width .3s; }

/* ================================================================
   COMPONENT: STEPPER
   ================================================================ */
.comp-stepper { display: inline-flex; align-items: center; border: 1px solid var(--border); border-radius: 4px; }
.comp-stepper button { width: 30px; height: 28px; font-size: 16px; cursor: pointer; background: #f7f8fa; color: var(--text); display: flex; align-items: center; justify-content: center; }
.comp-stepper button:active { background: #eee; }
.comp-stepper input { width: 40px; text-align: center; font-size: 14px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }

/* ================================================================
   COMPONENT: FORM / FIELD
   ================================================================ */
.comp-field { display: flex; align-items: center; padding: 12px 16px; background: #fff; }
.comp-field + .comp-field { border-top: 1px solid var(--border); }
.comp-field .field-label { width: 80px; font-size: 14px; color: var(--text); flex-shrink: 0; }
.comp-field .field-label.required::before { content: '*'; color: var(--danger); margin-right: 2px; }
.comp-field input, .comp-field textarea { flex: 1; font-size: 14px; text-align: right; }
.comp-field select { flex: 1; font-size: 14px; text-align: right; border: none; background: transparent; outline: none; color: var(--text); direction: rtl; }
.comp-field textarea { min-height: 80px; text-align: left; resize: vertical; padding: 8px 0; }

/* ================================================================
   COMPONENT: TOAST
   ================================================================ */
.comp-toast {
  position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); z-index: 999;
  background: rgba(0,0,0,.75); color: #fff; padding: 10px 20px; border-radius: 8px;
  font-size: 14px; white-space: nowrap; animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ================================================================
   COMPONENT: DIALOG
   ================================================================ */
.comp-dialog-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); z-index: 300; display: flex; align-items: center; justify-content: center; }
.comp-dialog-box { background: #fff; border-radius: 12px; width: 300px; overflow: hidden; animation: fadeIn .2s ease; }
.comp-dialog-box .dlg-header { padding: 20px 16px 8px; text-align: center; font-size: 16px; font-weight: 600; }
.comp-dialog-box .dlg-body { padding: 8px 16px 20px; text-align: center; font-size: 14px; color: var(--text-light); }
.comp-dialog-box .dlg-footer { display: flex; border-top: 1px solid var(--border); }
.comp-dialog-box .dlg-footer button { flex: 1; padding: 12px; font-size: 15px; cursor: pointer; }
.comp-dialog-box .dlg-footer .btn-cancel { color: var(--text-light); border-right: 1px solid var(--border); }
.comp-dialog-box .dlg-footer .btn-confirm { color: var(--primary); font-weight: 600; }

/* ================================================================
   PAGE: LOGIN
   ================================================================ */
.page-login { min-height: 100vh; background: linear-gradient(180deg, #eef3f8 0%, #dce6f0 100%); display: flex; flex-direction: column; align-items: center; padding: 60px 24px 30px; }
.page-login .logo-area { text-align: center; margin-bottom: 40px; }
.page-login .logo-area img { width: 80px; height: 80px; border-radius: 16px; margin: 0 auto 16px; box-shadow: 0 4px 16px rgba(0,0,0,.1); }
.page-login .logo-area .app-name { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.page-login .logo-area .slogan { font-size: 13px; color: var(--accent); }
.page-login .logo-area .desc { font-size: 12px; color: var(--text-lighter); margin-top: 4px; }
.page-login .wechat-btn {
  width: 100%; padding: 14px; border-radius: 8px; background: var(--success);
  color: #fff; font-size: 16px; text-align: center; cursor: pointer; margin-bottom: 16px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.page-login .wechat-btn .wx-icon { width: 24px; height: 24px; background: #fff; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: var(--success); font-weight: 700; font-size: 14px; }
.page-login .phone-toggle { font-size: 13px; color: var(--text-light); cursor: pointer; margin-bottom: 16px; }
.page-login .phone-form { width: 100%; background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.page-login .phone-form .input-row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
.page-login .phone-form .input-row input { flex: 1; font-size: 16px; }
.page-login .phone-form .code-btn { font-size: 13px; color: var(--primary); white-space: nowrap; cursor: pointer; padding: 6px 10px; border-radius: 4px; }
.page-login .phone-form .code-btn:active { background: #e8f4fd; }
.page-login .agreement { font-size: 11px; color: var(--text-lighter); margin-top: auto; }
.page-login .agreement a { color: var(--primary); }

/* ================================================================
   PAGE: HOME
   ================================================================ */
.page-home .home-header { background: linear-gradient(135deg, var(--primary), var(--primary-light)); padding: 12px 16px 16px; }
.page-home .home-header .top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.page-home .home-header .brand { display: flex; align-items: center; gap: 8px; }
.page-home .home-header .brand img { width: 28px; height: 28px; border-radius: 6px; }
.page-home .home-header .brand .name { color: #fff; font-size: 15px; font-weight: 600; }
.page-home .home-header .brand .sub { color: rgba(255,255,255,.7); font-size: 10px; }
.page-home .home-header .actions { display: flex; align-items: center; gap: 12px; }
.page-home .home-header .actions .role-tag { background: rgba(255,255,255,.25); color: #fff; padding: 3px 8px; border-radius: 10px; font-size: 11px; cursor: pointer; }
.page-home .search-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.3); z-index: 150; }
.page-home .search-results { background: #fff; max-height: 60vh; overflow-y: auto; margin: 0 12px; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.1); }
.page-home .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 16px; }
.page-home .menu-grid .menu-item { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
.page-home .menu-grid .menu-item .menu-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.page-home .menu-grid .menu-item .menu-label { font-size: 11px; color: var(--text); }
.page-home .slogan-banner { margin: 12px; padding: 20px; background: linear-gradient(135deg, #f0f5fa, #e8f0f8); border-radius: 10px; text-align: center; font-size: 16px; font-weight: 700; color: var(--primary); }
.page-home .feed-card { background: #fff; border-radius: 8px; padding: 14px; margin-bottom: 10px; }
.page-home .feed-card .feed-user { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.page-home .feed-card .feed-user img { width: 36px; height: 36px; border-radius: 50%; }
.page-home .feed-card .feed-user .uname { font-size: 14px; font-weight: 600; }
.page-home .feed-card .feed-user .umeta { font-size: 11px; color: var(--text-lighter); }
.page-home .feed-card .feed-content { font-size: 14px; line-height: 1.6; margin-bottom: 8px; }
.page-home .feed-card .feed-images { display: grid; gap: 4px; margin-bottom: 8px; }
.page-home .feed-card .feed-images.col1 { grid-template-columns: 1fr; }
.page-home .feed-card .feed-images.col2 { grid-template-columns: 1fr 1fr; }
.page-home .feed-card .feed-images.col3 { grid-template-columns: 1fr 1fr 1fr; }
.page-home .feed-card .feed-images img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 4px; }
.page-home .feed-card .feed-actions { display: flex; gap: 24px; font-size: 12px; color: var(--text-lighter); }
.page-home .feed-card .feed-actions span { cursor: pointer; display: flex; align-items: center; gap: 3px; }

/* ================================================================
   PAGE: ALUMNI FEED
   ================================================================ */
.feed-item { background: #fff; margin: 0 12px 10px; border-radius: 8px; padding: 14px; }
.feed-item .feed-user { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.feed-item .feed-user img { width: 38px; height: 38px; border-radius: 50%; }
.feed-item .feed-user .uname { font-size: 14px; font-weight: 600; }
.feed-item .feed-user .umeta { font-size: 11px; color: var(--text-lighter); }
.feed-item .feed-date { font-size: 11px; color: var(--text-lighter); }
.feed-item .feed-content { font-size: 14px; line-height: 1.6; margin: 8px 0; }
.feed-item .feed-images { display: grid; gap: 4px; margin: 8px 0; }
.feed-item .feed-images.col1 { grid-template-columns: 1fr; }
.feed-item .feed-images.col2 { grid-template-columns: 1fr 1fr; }
.feed-item .feed-images.col3 { grid-template-columns: 1fr 1fr 1fr; }
.feed-item .feed-images img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 4px; cursor: pointer; }
.feed-item .feed-actions { display: flex; gap: 24px; font-size: 12px; color: var(--text-lighter); padding-top: 8px; border-top: 1px solid var(--border); }
.feed-item .feed-actions span { cursor: pointer; display: flex; align-items: center; gap: 3px; }
.feed-item .feed-actions span.liked { color: var(--danger); }

/* ================================================================
   PAGE: ACTIVITY
   ================================================================ */
.activity-item { display: flex; padding: 12px 0; cursor: pointer; }
.activity-item + .activity-item { border-top: 1px solid var(--border); }
.activity-item .act-thumb { width: 110px; height: 80px; border-radius: 6px; object-fit: cover; flex-shrink: 0; margin-right: 10px; background: #f0f0f0; }
.activity-item .act-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: space-between; }
.activity-item .act-title { font-size: 14px; font-weight: 600; }
.activity-item .act-row { font-size: 11px; color: var(--text-light); display: flex; align-items: center; gap: 4px; }
.activity-item .act-bottom { display: flex; align-items: center; justify-content: space-between; }
.act-cover { width: 100%; height: 200px; object-fit: cover; }
.registered-avatars { display: flex; align-items: center; gap: -6px; padding: 8px 0; }
.registered-avatars img { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #fff; margin-left: -6px; }
.registered-avatars img:first-child { margin-left: 0; }
